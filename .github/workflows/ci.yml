name: Bot CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - "dev/**"
      - "dev__*"

concurrency:
  group: bot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Ruff, mypy and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Production secret guard
        run: python scripts/check_production_secrets.py --self-test

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        env:
          PYTHONPATH: src
        run: mypy

      - name: Tests
        env:
          PYTHONPATH: src
        run: pytest
